[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = [
  "corepack enable",
  "corepack prepare pnpm@latest --activate",
  "pnpm install --frozen-lockfile"
]

[phases.build]
cmds = [
  "pnpm --filter @repo/database run generate",
  "pnpm --filter @repo/shared run build",
  "pnpm --filter @repo/api run build"
]

[start]
cmd = "node apps/api/dist/index.js"
