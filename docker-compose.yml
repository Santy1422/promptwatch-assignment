services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: repo
      POSTGRES_PASSWORD: repo
      POSTGRES_DB: repo_development
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U repo"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
